<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nipto Dashboard</title>
    <link rel="stylesheet" href="nipto-shared.css">
</head>
<body>

    <div id="pinModal" style="display: none;">
        <div class="modal-content">
            <h2>Enter Dashboard PIN</h2>
            <p style="font-size: 14px; color: #aaa;">Please enter your 4-digit PIN to decrypt the API key.</p>
            <input type="password" id="pinInput" maxlength="4" placeholder="••••">
            <br>
            <button onclick="savePin(() => { loadTasksFromFirestore(); fetchWeeklyPoints(); })">Unlock</button>
            <div id="pinError" style="color: var(--danger); margin-top: 15px; display: none; font-size: 14px;">Invalid PIN format</div>
        </div>
    </div>

    <div class="page-wrapper">
        
        <div class="sidebar">
            <h3>This Week's Activity</h3>
            
            <div class="history-toggle">
                <button class="ht-btn active" id="htBoys" onclick="setHistoryView('boys')">Just Boys</button>
                <button class="ht-btn" id="htEveryone" onclick="setHistoryView('everyone')">Everyone</button>
            </div>

            <div id="historyContainer">
                <div class="empty-history">Loading history...</div>
            </div>
        </div>

        <div class="main-column">
            
            <div class="header" style="margin-bottom: 0;">
                <h2 style="margin-bottom: 15px; text-align: center;">Tasks Dashboard</h2>
                
                <div class="dashboard-header-controls" style="display: flex; justify-content: space-between; align-items: flex-start; border-bottom: none !important; padding-bottom: 0 !important; margin-bottom: 10px !important;">
                    
                    <div style="flex: 1;">
                        <div class="user-toggle-container">
                            <div class="user-toggle active" id="toggle-NMRQaRQbvCwBaJbiMFId" onclick="setActiveUser('NMRQaRQbvCwBaJbiMFId')">
                                <div class="user-name">Ayden</div>
                                <div class="user-points" id="points-NMRQaRQbvCwBaJbiMFId">-- pts</div>
                            </div>
                            
                            <div class="user-toggle inactive" id="toggle-RMNUTP8VOHD9PDzNjf0g" onclick="setActiveUser('RMNUTP8VOHD9PDzNjf0g')">
                                <div class="user-name">DJ</div>
                                <div class="user-points" id="points-RMNUTP8VOHD9PDzNjf0g">-- pts</div>
                            </div>
                        </div>

                        <div class="adult-points-container">
                            <div id="points-Llb9JjyTDvMnn8SJWfizXgthxl83"><span style="color: var(--text-main);">Alyssa:</span> <span style="color: var(--primary);">-- pts</span></div>
                            <div id="points-cHnAKABalRf0gETPsDt9EiJLyZd2"><span style="color: var(--text-main);">Devyn:</span> <span style="color: var(--primary);">-- pts</span></div>
                            <div id="points-2pxnC1oGlZbLQLmu9UJJVPYOEmZ2"><span style="color: var(--text-main);">Carrina:</span> <span style="color: var(--primary);">-- pts</span></div>
                        </div>
                    </div>

                    <div style="display: flex; gap: 10px; flex-wrap: wrap; justify-content: flex-end; margin-left: 15px;">
                        <button id="syncNiptoBtn" class="action-btn" onclick="syncNiptoTasks(loadTasksFromFirestore)" style="display: none; background-color: var(--secondary); font-size: 20px; padding: 5px 12px;" title="Sync Database">🔄</button>
                        <button id="editBtn" class="action-btn" onclick="toggleEditMode()" title="Edit Dashboard" style="font-size: 20px; padding: 5px 12px;">✏️</button>
                    </div>
                </div>

                <div class="controls-wrapper" style="margin-top: 5px;">
                    <div id="status" style="text-align: center; font-weight: bold; min-height: 0;"></div>
                </div>
            </div>

            <div id="mainContainer"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="firebase-config.js"></script>
    
    <script src="nipto-shared.js"></script>

    <script>
        // --- CONFIGURATION ---
        const BOYS = [
            { uid: "NMRQaRQbvCwBaJbiMFId", name: "Ayden" },
            { uid: "RMNUTP8VOHD9PDzNjf0g", name: "DJ" }
        ];

        const ADULTS = [
            { uid: "Llb9JjyTDvMnn8SJWfizXgthxl83", name: "Alyssa" },
            { uid: "cHnAKABalRf0gETPsDt9EiJLyZd2", name: "Devyn" },
            { uid: "2pxnC1oGlZbLQLmu9UJJVPYOEmZ2", name: "Carrina" }
        ];

        const ALL_USERS = [...BOYS, ...ADULTS];
        
        let TASKS = [];
        let isEditMode = false;
        let tempEditPrefs = new Set(); 
        let activeUserId = "NMRQaRQbvCwBaJbiMFId";

        // Global state for the history stream
        let allWeekActivities = [];
        let historyViewMode = 'boys'; 

        // --- USER & DASHBOARD PREFERENCES ---
        function initUsers() {
            const lastUser = localStorage.getItem("nipto_kids_last_user");
            if (lastUser && BOYS.find(u => u.uid === lastUser)) {
                setActiveUser(lastUser);
            } else {
                setActiveUser(BOYS[0].uid);
            }
        }

        function setActiveUser(uid) {
            if (isEditMode) return; 
            
            activeUserId = uid;
            localStorage.setItem("nipto_kids_last_user", uid);
            
            BOYS.forEach(user => {
                const el = document.getElementById(`toggle-${user.uid}`);
                if (user.uid === uid) {
                    el.classList.add('active');
                    el.classList.remove('inactive');
                } else {
                    el.classList.add('inactive');
                    el.classList.remove('active');
                }
            });
        }

        function getSharedPreferences() {
            const prefs = new Set();
            TASKS.forEach(t => {
                if (t.dashboardUsers && (t.dashboardUsers.includes("NMRQaRQbvCwBaJbiMFId") || t.dashboardUsers.includes("RMNUTP8VOHD9PDzNjf0g"))) {
                    prefs.add(t.uid);
                }
            });
            return prefs;
        }

        async function toggleEditMode() {
            const btn = document.getElementById('editBtn');
            const syncBtn = document.getElementById('syncNiptoBtn');
            const statusDiv = document.getElementById('status');

            if (!isEditMode) {
                isEditMode = true;
                btn.innerText = "💾";
                btn.classList.add('save-mode');
                syncBtn.style.display = 'inline-block';
                statusDiv.innerText = "EDIT MODE: Click tasks to add/remove them from the shared dashboard.";
                statusDiv.style.color = "var(--primary)";
                
                tempEditPrefs = getSharedPreferences();
                renderTasks();
            } else {
                btn.innerText = "⏳";
                btn.disabled = true;
                syncBtn.disabled = true;
                
                await savePreferencesToFirestore();

                isEditMode = false;
                btn.innerText = "✏️";
                btn.classList.remove('save-mode');
                btn.disabled = false;
                syncBtn.style.display = 'none';
                syncBtn.disabled = false;
                
                statusDiv.innerText = "";
                renderTasks();
            }
        }

        async function savePreferencesToFirestore() {
            let batch = window.db.batch();
            let hasChanges = false;

            TASKS.forEach(task => {
                const wantsItOnDash = tempEditPrefs.has(task.uid);
                const currentlyHasIt = task.dashboardUsers && (task.dashboardUsers.includes("NMRQaRQbvCwBaJbiMFId") || task.dashboardUsers.includes("RMNUTP8VOHD9PDzNjf0g"));
                
                if (wantsItOnDash !== currentlyHasIt) {
                    hasChanges = true;
                    let newUsersList = task.dashboardUsers ? [...task.dashboardUsers] : [];
                    
                    if (wantsItOnDash) {
                        if (!newUsersList.includes("NMRQaRQbvCwBaJbiMFId")) newUsersList.push("NMRQaRQbvCwBaJbiMFId");
                        if (!newUsersList.includes("RMNUTP8VOHD9PDzNjf0g")) newUsersList.push("RMNUTP8VOHD9PDzNjf0g");
                    } else {
                        newUsersList = newUsersList.filter(id => id !== "NMRQaRQbvCwBaJbiMFId" && id !== "RMNUTP8VOHD9PDzNjf0g");
                    }
                    
                    task.dashboardUsers = newUsersList;
                    
                    const docRef = window.db.collection('nipto_tasks').doc(task.uid);
                    batch.update(docRef, { dashboardUsers: newUsersList });
                }
            });

            if (hasChanges) {
                try { await batch.commit(); } 
                catch (error) { console.error("Error saving preferences to Firebase:", error); alert("Failed to save dashboard preferences."); }
            }
        }

        function handleTaskClick(btn, taskUid, taskName) {
            if (isEditMode) {
                if (tempEditPrefs.has(taskUid)) {
                    tempEditPrefs.delete(taskUid);
                    btn.classList.remove('selected-pref');
                    btn.classList.add('unselected-pref');
                } else {
                    tempEditPrefs.add(taskUid);
                    btn.classList.add('selected-pref');
                    btn.classList.remove('unselected-pref');
                }
            } else {
                logTask(btn, taskUid, taskName);
            }
        }

        // --- FIRESTORE / API LOGIC ---
        async function loadTasksFromFirestore() {
            try {
                const snapshot = await window.db.collection('nipto_tasks').get();
                TASKS = snapshot.docs.map(doc => {
                    const data = doc.data();
                    return {
                        uid: doc.id,
                        name: data.name,
                        value: data.value || 0,
                        icon: data.group || "📌", 
                        category: data.group || "📌", 
                        dashboardUsers: data.dashboardUsers || [] 
                    };
                });
                renderTasks();
            } catch (error) {
                const statusDiv = document.getElementById('status');
                statusDiv.innerText = "Error loading database: " + error.message;
                statusDiv.style.color = "var(--danger)";
            }
        }

        async function fetchWeeklyPoints() {
            if (!API_TOKEN) return;
            
            const QUERY = `
                {
                    activities {
                        uid
                        date
                        user { uid name }
                        task { name value } 
                    }
                }
            `;

            try {
                // Uses the new fetchNipto wrapper function
                const data = await fetchNipto(QUERY);
                const activities = data.activities;
                
                if (!activities) throw new Error("No activities data found.");

                let points = {};
                ALL_USERS.forEach(u => points[u.uid] = 0);
                
                allWeekActivities = []; 

                const now = new Date();
                const dayOfWeek = now.getDay(); 
                const distanceToStart = dayOfWeek === 0 ? 6 : dayOfWeek - 1; 
                
                const startOfWeek = new Date(now.getFullYear(), now.getMonth(), now.getDate() - distanceToStart);
                startOfWeek.setHours(0, 0, 0, 0);

                activities.forEach(activity => {
                    const activityDate = new Date(activity.date);
                    if (activityDate >= startOfWeek) {
                        if (activity.user && points[activity.user.uid] !== undefined) {
                            points[activity.user.uid] += (activity.task && activity.task.value) ? activity.task.value : 0;
                        }
                        allWeekActivities.push({
                            ...activity,
                            parsedDate: activityDate
                        });
                    }
                });

                // 1. Update the Boy's toggle text
                BOYS.forEach(user => {
                    const el = document.getElementById(`points-${user.uid}`);
                    if (el) el.innerText = points[user.uid] + " pts";
                });

                // 2. Crown the Leader between Ayden and DJ
                let aydenPts = points["NMRQaRQbvCwBaJbiMFId"] || 0;
                let djPts = points["RMNUTP8VOHD9PDzNjf0g"] || 0;

                document.querySelectorAll('.leader-crown').forEach(el => el.remove());

                if (aydenPts > djPts && aydenPts > 0) {
                    document.getElementById('toggle-NMRQaRQbvCwBaJbiMFId').innerHTML += '<div class="leader-crown">👑</div>';
                } else if (djPts > aydenPts && djPts > 0) {
                    document.getElementById('toggle-RMNUTP8VOHD9PDzNjf0g').innerHTML += '<div class="leader-crown">👑</div>';
                }

                // 3. The Household Leaderboard
                let sortedUsers = ALL_USERS.map(u => ({ 
                    name: u.name, 
                    pts: points[u.uid],
                    isBoy: BOYS.some(b => b.uid === u.uid)
                })).sort((a, b) => b.pts - a.pts);

                let leaderboardHtml = sortedUsers.map((u, index) => {
                    let medal = index === 0 ? '🥇 1.' : index === 1 ? '🥈 2. ' : index === 2 ? '🥉 3.' : `${index + 1}.`;
                    let highlightClass = u.isBoy ? 'color: var(--primary); font-weight: 800;' : 'color: var(--text-main); font-weight: 600;';
                    
                    return `<div><span style="color: var(--text-muted); margin-right: 3px;">${medal}</span> <span style="${highlightClass}">${u.name}: ${u.pts} pts</span></div>`;
                }).join('<div style="width: 1px; background: var(--border-color); margin: 0 10px;"></div>'); 

                const adultContainer = document.querySelector('.adult-points-container');
                if(adultContainer) {
                    adultContainer.innerHTML = leaderboardHtml;
                    adultContainer.style.flexWrap = 'wrap'; 
                }

                updateHistoryDisplay();

            } catch (error) {
                console.error("Error fetching points/history:", error);
                document.getElementById('historyContainer').innerHTML = "<div class='empty-history'>Error loading history.</div>";
            }
        }

        // --- HISTORY TOGGLE LOGIC ---
        function setHistoryView(mode) {
            historyViewMode = mode;
            document.getElementById('htBoys').classList.toggle('active', mode === 'boys');
            document.getElementById('htEveryone').classList.toggle('active', mode === 'everyone');
            updateHistoryDisplay();
        }

        function updateHistoryDisplay() {
            let filteredActivities = allWeekActivities;
            
            if (historyViewMode === 'boys') {
                filteredActivities = allWeekActivities.filter(act => 
                    act.user && (act.user.uid === "NMRQaRQbvCwBaJbiMFId" || act.user.uid === "RMNUTP8VOHD9PDzNjf0g")
                );
            }
            
            renderHistory(filteredActivities);
        }

        function renderHistory(activities) {
            const container = document.getElementById('historyContainer');
            container.innerHTML = '';

            if (activities.length === 0) {
                container.innerHTML = '<div class="empty-history">No tasks found.</div>';
                return;
            }

            activities.sort((a, b) => b.parsedDate - a.parsedDate);
            const timeOptions = { weekday: 'short', hour: 'numeric', minute: '2-digit' };

            activities.forEach(act => {
                const knownUser = ALL_USERS.find(u => u.uid === (act.user && act.user.uid));
                const userName = knownUser ? knownUser.name : (act.user && act.user.name ? act.user.name : "Unknown User");
                
                const taskName = act.task ? act.task.name : "Deleted Task";
                const taskValue = act.task ? act.task.value : 0;
                const formattedTime = act.parsedDate.toLocaleDateString(undefined, timeOptions);

                const isBoy = act.user && (act.user.uid === "NMRQaRQbvCwBaJbiMFId" || act.user.uid === "RMNUTP8VOHD9PDzNjf0g");
                const userColorClass = isBoy ? `history-user-${act.user.uid}` : 'history-user-other';

                const itemDiv = document.createElement('div');
                itemDiv.className = 'history-item';
                
                itemDiv.innerHTML = `
                    <div class="history-item-content">
                        <div class="history-task-name">${taskName}</div>
                        <div class="history-details">
                            <span class="${userColorClass}">${userName} (+${taskValue})</span>
                            <span>${formattedTime}</span>
                        </div>
                    </div>
                    <button class="delete-activity-btn" onclick="deleteTaskActivity('${act.uid}', this)" title="Delete Activity">🗑️</button>
                `;
                container.appendChild(itemDiv);
            });
        }

        async function logTask(buttonElement, taskUid, taskName) {
            if (buttonElement.classList.contains('success')) return;
            if (!API_TOKEN) { document.getElementById('pinModal').style.display = 'flex'; return; }

            const statusDiv = document.getElementById('status');
            buttonElement.disabled = true;

            const targetDate = new Date(); 
            const exactFormatString = targetDate.toISOString();
            const activeUserName = BOYS.find(u => u.uid === activeUserId).name;

            statusDiv.innerText = `Logging: ${taskName} for ${activeUserName}...`;
            statusDiv.style.color = 'var(--text-main)';

            const MUTATION = `mutation CreateActivity($done: String!, $doers: [String!], $date: Date) { createActivity(done: $done, doers: $doers, date: $date) { uid } }`;

            try {
                // Uses the new fetchNipto wrapper function
                await fetchNipto(MUTATION, { done: taskUid, doers: [activeUserId], date: exactFormatString });

                statusDiv.innerText = `Successfully logged for ${activeUserName}!`;
                statusDiv.style.color = 'var(--success)';
                
                buttonElement.classList.add('success');
                buttonElement.innerHTML += '<br><span style="font-size:12px;">✓ Logged</span>';
                
                fetchWeeklyPoints();

                setTimeout(() => {
                    buttonElement.classList.remove('success');
                    buttonElement.disabled = false;
                    buttonElement.innerHTML = buttonElement.getAttribute('data-original-html');
                    statusDiv.innerText = "";
                    statusDiv.style.color = 'var(--text-main)';
                }, 3000);

            } catch (error) {
                statusDiv.innerText = `Error: ${error.message}`;
                statusDiv.style.color = 'var(--danger)';
                buttonElement.disabled = false;
            }
        }
        
        async function deleteTaskActivity(activityUid, btnElement) {
            if (!API_TOKEN) { document.getElementById('pinModal').style.display = 'flex'; return; }
            if (!confirm("Are you sure you want to delete this logged task?")) return;

            const statusDiv = document.getElementById('status');
            const originalHtml = btnElement.innerHTML;
            
            btnElement.disabled = true;
            btnElement.innerHTML = "⏳";

            statusDiv.innerText = `Deleting activity...`;
            statusDiv.style.color = 'var(--text-main)';

            const MUTATION = `mutation DeleteActivity($uid: String!) { deleteActivity(uid: $uid) { uid } }`;

            try {
                // Uses the new fetchNipto wrapper function
                await fetchNipto(MUTATION, { uid: activityUid });

                statusDiv.innerText = `Activity deleted successfully!`;
                statusDiv.style.color = 'var(--success)';
                
                fetchWeeklyPoints();

                setTimeout(() => {
                    statusDiv.innerText = "";
                    statusDiv.style.color = 'var(--text-main)';
                }, 3000);

            } catch (error) {
                console.error("Delete Error:", error);
                statusDiv.innerText = `Error: ${error.message}`;
                statusDiv.style.color = 'var(--danger)';
                btnElement.disabled = false;
                btnElement.innerHTML = originalHtml;
            }
        }

        // --- RENDER MAIN TASKS ---
        function renderTasks() {
            const container = document.getElementById('mainContainer');
            container.innerHTML = ''; 
            
            const userPrefs = getSharedPreferences();
            const visibleTasks = TASKS.filter(t => isEditMode || userPrefs.has(t.uid));

            if (visibleTasks.length === 0 && !isEditMode) {
                container.innerHTML = '<div class="empty-dashboard-msg" style="text-align: center; margin-top: 40px; color: var(--text-muted);">Your dashboard is empty. Click the pencil icon to add tasks!</div>';
                return;
            }

            const groupedTasks = visibleTasks.reduce((acc, task) => {
                if (!acc[task.category]) acc[task.category] = [];
                acc[task.category].push(task);
                return acc;
            }, {});

            const categories = Object.keys(groupedTasks).sort();

            categories.forEach(category => {
                const section = document.createElement('div');
                section.className = 'category-section';

                const header = document.createElement('h3');
                header.className = 'category-header';
                header.innerText = category;
                section.appendChild(header);

                const grid = document.createElement('div');
                grid.className = 'task-grid';

                groupedTasks[category].forEach(task => {
                    const btn = document.createElement('button');
                    btn.className = 'task-btn';
                    
                    const taskContentHtml = `<span>${task.name}</span><span style="display:block; margin-top:5px; font-weight:bold; color:var(--primary); font-size:13px;">${task.value} pts</span>`;

                    if (isEditMode) {
                        btn.classList.add('edit-mode');
                        if (tempEditPrefs.has(task.uid)) {
                            btn.classList.add('selected-pref');
                            btn.innerHTML = `${taskContentHtml}<span style="font-size:12px; margin-top:5px; display:block;">✅ Selected</span>`;
                        } else {
                            btn.classList.add('unselected-pref');
                            btn.innerHTML = `${taskContentHtml}<span style="font-size:12px; margin-top:5px; display:block;">❌ Hidden</span>`;
                        }
                    } else {
                        btn.innerHTML = taskContentHtml;
                    }
                    
                    btn.setAttribute('data-original-html', btn.innerHTML);
                    btn.onclick = () => handleTaskClick(btn, task.uid, task.name);
                    grid.appendChild(btn);
                });

                section.appendChild(grid);
                container.appendChild(section);
            });
        }

        // Initialize
        initUsers();
        // Updated to use the shared checkAuth and pass the local loading functions
        checkAuth(() => { 
            loadTasksFromFirestore(); 
            fetchWeeklyPoints(); 
        });

    </script>
</body>
</html>
