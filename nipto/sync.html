<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Nipto Task Sync</title>
    <link rel="stylesheet" href="nipto-shared.css">
</head>
<body>

    <div class="card">
        <h1>Live Nipto Sync</h1>
        <p>Enter your 4-digit PIN to authenticate with the Nipto API and sync tasks to Firestore.</p>
        
        <div style="display: flex; align-items: center; margin-bottom: 20px;">
            <input type="password" id="pinInput" maxlength="4" placeholder="••••">
            <button id="sync-btn">Fetch & Sync Database</button>
        </div>
        
        <div id="status-message">Waiting for input...</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <script src="firebase-config.js"></script>
    <script src="sync-tasks.js"></script>
</body>
</html>
