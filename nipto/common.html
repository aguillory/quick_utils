<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Nipto Dashboard</title>
    <link rel="stylesheet" href="nipto-shared.css">
</head>
<body>
    <div id="pinModal" style="display: none;">
        <div class="modal-content">
            <h2>Enter Dashboard PIN</h2>
            <p style="font-size: 14px; color: #aaa;">Please enter your 4-digit PIN to decrypt the API key.</p>
            <input type="password" id="pinInput" maxlength="4" placeholder="••••">
            <br>
            <button onclick="savePin(() => { loadTasksFromFirestore(); fetchWeeklyPoints(); })">Unlock</button>
            <div id="pinError" style="color: var(--danger); margin-top: 15px; display: none; font-size: 14px;">Invalid PIN format</div>
        </div>
    </div>

    <div class="page-wrapper">
        
        <div class="sidebar left-sidebar">
            <h3 class="collapsible-header" onclick="toggleSection('activity-content', 'activity-icon', 'nipto_activity_collapsed')">
                This Week's Activity <span class="toggle-icon" id="activity-icon">▼</span>
            </h3>
            <div id="activity-content" class="collapsible-content">
                <div id="historyContainer">
                    <div class="empty-history">Loading history...</div>
                </div>
            </div>
        </div>

        <div class="header">
            <div class="dashboard-header-controls">
                <div style="flex: 1;">
                    <h2 style="margin-bottom: 15px;">Household Tasks</h2>
                    <div class="user-select-container" style="margin-bottom: 15px;">
                        <label for="userSelect" style="font-weight: 600; margin-right: 10px;">Dashboard For:</label>
                        <select id="userSelect" onchange="onUserChange()"></select>
                    </div>
                    
                    <div id="leaderboard-container" class="adult-points-container">
                        Loading rankings...
                    </div>
                </div>
                
                <div style="display: flex; gap: 10px; flex-wrap: wrap; justify-content: flex-end; margin-left: 15px;">
                    <button id="syncNiptoBtn" class="action-btn" onclick="syncNiptoTasks(loadTasksFromFirestore)" style="display: none; background-color: var(--secondary);">🔄 Sync DB</button>
                    <button id="viewAllBtn" class="action-btn" onclick="toggleViewAll()">🔍 View All</button>
                    <button id="editBtn" class="action-btn" onclick="toggleEditMode()">✏️ Edit Dashboard</button>
                </div>
            </div>

            <div class="controls-wrapper">
                <div class="mode-toggle">
                    <button class="mode-btn active" id="btnLive" onclick="setMode('live')">Live Time</button>
                    <button class="mode-btn" id="btnCustom" onclick="setMode('custom')">Custom Time</button>
                </div>

                <div class="custom-time-container" id="customTimeBox">
                    <div class="quick-times">
                        <button class="qt-btn" onclick="setTimeOffset(-15)">-15m</button>
                        <button class="qt-btn" onclick="setTimeOffset(-60)">-1h</button>
                        <button class="qt-btn" onclick="setTimeOffset(-1440)">Yesterday</button>
                    </div>
                    <div class="date-input-group">
                        <input type="datetime-local" id="taskDate">
                    </div>
                </div>

                <div id="status">Checking database...</div>
            </div>
        </div>

        <div class="main-content">
            <div id="mainContainer"></div>
        </div>
        
        <div class="right-sidebar">
            <div class="widget-panel">
                <h4 class="collapsible-header" onclick="toggleSection('pinned-content', 'pin-icon', 'nipto_pin_collapsed')" style="font-size: 16px; margin: 0 0 10px 0; border-bottom: 1px solid var(--border-color); padding-bottom: 8px;">
                    📌 Pinned Reminders <span class="toggle-icon" id="pin-icon">▼</span>
                </h4>
                <div id="pinned-content" class="collapsible-content">
                    <div id="pinnedContainer"></div>
                </div>
            </div>

            <div class="widget-panel">
                <h4 class="collapsible-header" onclick="toggleSection('assigned-content', 'assign-icon', 'nipto_assign_collapsed')" style="font-size: 16px; margin: 0 0 10px 0; border-bottom: 1px solid var(--border-color); padding-bottom: 8px;">
                    📋 Assigned Tasks <span class="toggle-icon" id="assign-icon">▼</span>
                </h4>
                <div id="assigned-content" class="collapsible-content">
                    <div id="choresContainer">Loading chores...</div>
                </div>
            </div>
        </div>

    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="firebase-config.js"></script>
    <script src="nipto-shared.js"></script>

    <script>
        // --- CONFIGURATION ---
        const DASHBOARD_USERS = [
            { uid: "2pxnC1oGlZbLQLmu9UJJVPYOEmZ2", name: "Carrina" },
            { uid: "Llb9JjyTDvMnn8SJWfizXgthxl83", name: "Alyssa M" },
            { uid: "cHnAKABalRf0gETPsDt9EiJLyZd2", name: "Devyn" }
        ];
        
        const ALL_USERS = [
            ...DASHBOARD_USERS,
            { uid: "NMRQaRQbvCwBaJbiMFId", name: "Ayden" },
            { uid: "RMNUTP8VOHD9PDzNjf0g", name: "DJ" }
        ];

        let TASKS = [];
        let CUSTOM_CHORES = [];
        let allWeekActivities = [];
        
        let currentMode = 'live'; 
        let isEditMode = false;
        let isViewAllMode = false;
        let tempEditPrefs = new Set(); 

        // --- INIT & USER PREFERENCES ---
        function initUsers() {
            const select = document.getElementById('userSelect');
            const lastUser = localStorage.getItem("nipto_last_user");

            DASHBOARD_USERS.forEach(user => {
                const option = document.createElement('option');
                option.value = user.uid;
                option.text = user.name;
                
                if (lastUser && user.uid === lastUser) {
                    option.selected = true;
                } else if (!lastUser && user.uid === "Llb9JjyTDvMnn8SJWfizXgthxl83") {
                    option.selected = true;
                }
                
                select.appendChild(option);
            });
        }

        function onUserChange() {
            const selectedUid = document.getElementById('userSelect').value;
            localStorage.setItem("nipto_last_user", selectedUid);
            if (isEditMode) toggleEditMode(); 
            
            renderTasks();
            renderPinnedTasks();
            renderChores();
        }

        function getActiveUserId() {
            return document.getElementById('userSelect').value;
        }

        function getUserPreferences() {
            const userId = getActiveUserId();
            const prefs = new Set();
            TASKS.forEach(t => {
                if (t.dashboardUsers && t.dashboardUsers.includes(userId)) {
                    prefs.add(t.uid);
                }
            });
            return prefs;
        }

        // --- DASHBOARD EDITING ---
        function toggleViewAll() {
            if (isEditMode) return;
            isViewAllMode = !isViewAllMode;
            const btn = document.getElementById('viewAllBtn');
            const statusDiv = document.getElementById('status');

            if (isViewAllMode) {
                btn.innerText = "🏠 View My Dashboard";
                statusDiv.innerText = "Viewing ALL Tasks";
            } else {
                btn.innerText = "🔍 View All Tasks";
                statusDiv.innerText = currentMode === 'live' ? "Ready (Using exact current time on click)" : "Ready (Using custom time above)";
            }
            renderTasks();
        }

        async function toggleEditMode() {
            const btn = document.getElementById('editBtn');
            const syncBtn = document.getElementById('syncNiptoBtn');
            const viewAllBtn = document.getElementById('viewAllBtn');
            const statusDiv = document.getElementById('status');

            if (!isEditMode) {
                isEditMode = true;
                btn.innerText = "💾 Save Dashboard";
                btn.classList.add('save-mode');
                syncBtn.style.display = 'inline-block'; 
                viewAllBtn.style.display = 'none';
                statusDiv.innerText = "EDIT MODE: Click tasks to add/remove them from this user's dashboard.";
                statusDiv.style.color = "var(--primary)";
                
                if (isViewAllMode) {
                    isViewAllMode = false;
                    viewAllBtn.innerText = "🔍 View All Tasks";
                }
                
                tempEditPrefs = getUserPreferences();
                renderTasks();
            } else {
                btn.innerText = "Saving...";
                btn.disabled = true;
                syncBtn.disabled = true;
                
                await savePreferencesToFirestore();

                isEditMode = false;
                btn.innerText = "✏️ Edit Dashboard";
                btn.classList.remove('save-mode');
                btn.disabled = false;
                syncBtn.style.display = 'none'; 
                viewAllBtn.style.display = 'inline-block';
                syncBtn.disabled = false;
                
                statusDiv.innerText = currentMode === 'live' ? "Ready (Using exact current time on click)" : "Ready (Using custom time above)";
                statusDiv.style.color = "var(--text-main)";
                renderTasks();
            }
        }

        async function savePreferencesToFirestore() {
            const userId = getActiveUserId();
            let batch = window.db.batch();
            let hasChanges = false;

            TASKS.forEach(task => {
                const wantsItOnDash = tempEditPrefs.has(task.uid);
                const hasItCurrently = task.dashboardUsers && task.dashboardUsers.includes(userId);
                
                if (wantsItOnDash !== hasItCurrently) {
                    hasChanges = true;
                    let newUsersList = task.dashboardUsers ? [...task.dashboardUsers] : [];
                    
                    if (wantsItOnDash) newUsersList.push(userId);
                    else newUsersList = newUsersList.filter(id => id !== userId);
                    
                    task.dashboardUsers = newUsersList;
                    
                    const docRef = window.db.collection('nipto_tasks').doc(task.uid);
                    batch.update(docRef, { dashboardUsers: newUsersList });
                }
            });

            if (hasChanges) {
                try { await batch.commit(); } 
                catch (error) { console.error(error); alert("Failed to save dashboard preferences."); }
            }
        }

        // --- FIRESTORE LOGIC ---
        async function loadTasksFromFirestore() {
            const statusDiv = document.getElementById('status');
            statusDiv.innerText = "Loading tasks from database...";
            try {
                const snapshot = await window.db.collection('nipto_tasks').get();
                TASKS = snapshot.docs.map(doc => {
                    const data = doc.data();
                    return {
                        uid: doc.id,
                        name: data.name,
                        value: data.value || 0,
                        icon: data.group || "📌",
                        category: data.group || "📌",
                        dashboardUsers: data.dashboardUsers || [],
                        pinnedUsers: data.pinnedUsers || [] 
                    };
                });
                
                statusDiv.innerText = currentMode === 'live' ? "Ready (Using exact current time on click)" : "Ready (Using custom time above)";
                renderTasks();
                renderPinnedTasks();
            } catch (error) {
                statusDiv.innerText = "Error loading database: " + error.message;
                statusDiv.style.color = "var(--danger)";
            }
        }

        async function loadChoresFromFirestore() {
            try {
                const snapshot = await window.db.collection('custom_chores').get();
                CUSTOM_CHORES = snapshot.docs.map(doc => ({ uid: doc.id, ...doc.data() }));
                renderChores();
            } catch (error) {
                console.error("Error loading assigned chores:", error);
            }
        }

        // --- PINNED TASKS LOGIC ---
        async function togglePinTask(taskUid) {
            const task = TASKS.find(t => t.uid === taskUid);
            if (!task) return;

            const userId = getActiveUserId();
            let pinned = task.pinnedUsers ? [...task.pinnedUsers] : [];

            if (pinned.includes(userId)) pinned = pinned.filter(id => id !== userId);
            else pinned.push(userId);

            task.pinnedUsers = pinned;
            renderTasks();
            renderPinnedTasks();

            try {
                await window.db.collection('nipto_tasks').doc(taskUid).update({ pinnedUsers: pinned });
            } catch (error) {
                console.error("Error updating pin:", error);
            }
        }

        function renderPinnedTasks() {
            const container = document.getElementById('pinnedContainer');
            container.innerHTML = '';
            
            const userId = getActiveUserId();
            const myPinnedTasks = TASKS.filter(t => t.pinnedUsers && t.pinnedUsers.includes(userId));

            if (myPinnedTasks.length === 0) {
                container.innerHTML = '<div class="empty-history" style="margin-top: 10px;">No pinned tasks.</div>';
                return;
            }

            myPinnedTasks.forEach(task => {
                const card = document.createElement('div');
                card.className = 'chore-card';
                card.innerHTML = `
                    <div class="chore-header">
                        <div class="chore-title-area">
                            <div class="chore-title">📌 ${task.name}</div>
                        </div>
                        <div class="chore-actions">
                            <button class="chore-btn complete-btn" onclick="logPinnedTask(this, '${task.uid}', '${task.name}')" title="Log Task">✅</button>
                            <button class="chore-btn delete-btn" onclick="togglePinTask('${task.uid}')" title="Unpin">❌</button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        async function logPinnedTask(btnElement, taskUid, taskName) {
            const success = await logTask(btnElement, taskUid, taskName);
            if (success) {
                await togglePinTask(taskUid);
            }
        }


        // --- ASSIGNED TASKS (CHORES) LOGIC ---
        function renderChores() {
            const container = document.getElementById('choresContainer');
            container.innerHTML = '';
            
            const userId = getActiveUserId();
            let visibleChores = CUSTOM_CHORES.filter(c => c.assignees && c.assignees.includes(userId));
            visibleChores.sort((a, b) => (a.completed === b.completed) ? 0 : a.completed ? 1 : -1);

            if (visibleChores.length === 0) {
                container.innerHTML = '<div class="empty-history" style="margin-top: 10px;">No assigned tasks.</div>';
                return;
            }

            visibleChores.forEach(chore => {
                const linkedTask = TASKS.find(t => t.uid === chore.linkedNiptoTask);
                const displayPoints = linkedTask && linkedTask.value > 0 ? linkedTask.value : '?';

                const card = document.createElement('div');
                card.className = `chore-card ${chore.completed ? 'completed' : ''}`;
                
                let actionHtml = '';
                if (chore.completed) {
                    let uidsJson = JSON.stringify(chore.completedActivityUids || []);
                    uidsJson = uidsJson.replace(/"/g, '&quot;'); 
                    let legacyUid = chore.completedActivityUid || "null";
                    actionHtml = `<button class="chore-btn undo-btn" onclick="undoChore('${chore.uid}', '${legacyUid}', '${uidsJson}')" title="Undo Complete">↩️</button>`;
                } else {
                    actionHtml = `<button class="chore-btn complete-btn" onclick="completeChore('${chore.uid}', '${chore.linkedNiptoTask}')" title="Mark Complete">✅</button>`;
                }

                let completedUiHtml = '';
                if (chore.completed && chore.completedInfo) {
                    const formattedDate = new Date(chore.completedInfo.date).toLocaleString([], { weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
                    completedUiHtml = `<div class="chore-completion-info"><b>✓ Logged by:</b> ${chore.completedInfo.names}<br><b>🕒 When:</b> ${formattedDate}</div>`;
                }

                card.innerHTML = `
                    <div class="chore-header">
                        <div class="chore-title-area" onclick="document.getElementById('desc-${chore.uid}').classList.toggle('open'); document.getElementById('icon-${chore.uid}').classList.toggle('open');">
                            <div class="chore-title">${chore.title} <span class="chore-expand-icon" id="icon-${chore.uid}">▼</span></div>
                            <div class="chore-points">+${displayPoints} pts</div>
                        </div>
                        <div class="chore-actions">${actionHtml}</div>
                    </div>
                    ${completedUiHtml}
                    <div class="chore-desc" id="desc-${chore.uid}">
                        ${chore.description ? chore.description.replace(/\n/g, '<br>') : '<i>No additional details</i>'}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        async function completeChore(choreUid, linkedTaskUid) {
            if (!API_TOKEN) { document.getElementById('pinModal').style.display = 'flex'; return; }
            
            try {
                const exactFormatString = new Date().toISOString();
                const MUTATION = `mutation CreateActivity($done: String!, $doers: [String!], $date: Date) { createActivity(done: $done, doers: $doers, date: $date) { uid } }`;
                
                const activeUser = ALL_USERS.find(u => u.uid === getActiveUserId());
                const doers = [activeUser.uid];

                const baseTask = TASKS.find(t => t.uid === linkedTaskUid);
                const pointsGiven = baseTask ? baseTask.value : 0;

                const data = await fetchNipto(MUTATION, { done: linkedTaskUid, doers: doers, date: exactFormatString });
                
                let activityUids = [];
                if (data && data.createActivity) {
                    if (Array.isArray(data.createActivity)) activityUids = data.createActivity.map(a => a.uid);
                    else if (data.createActivity.uid) activityUids = [data.createActivity.uid];
                }

                await window.db.collection('custom_chores').doc(choreUid).update({
                    completed: true,
                    completedActivityUids: activityUids,
                    completedInfo: { names: activeUser.name, date: exactFormatString, pointsEach: pointsGiven }
                });

                loadChoresFromFirestore();
                fetchWeeklyPoints();
            } catch (error) { alert("Error completing task: " + error.message); }
        }

        async function undoChore(choreUid, legacyActivityUid, activityUidsJson) {
            if (!API_TOKEN) { document.getElementById('pinModal').style.display = 'flex'; return; }
            if (!confirm("Undo this task and remove the points from Nipto?")) return;

            try {
                let uidsToDelete = [];
                if (activityUidsJson && activityUidsJson !== "undefined") uidsToDelete = JSON.parse(activityUidsJson.replace(/&quot;/g, '"'));
                if (uidsToDelete.length === 0 && legacyActivityUid && legacyActivityUid !== "null") uidsToDelete = [legacyActivityUid];

                for (const uid of uidsToDelete) {
                    await fetchNipto(`mutation DeleteActivity($uid: String!) { deleteActivity(uid: $uid) { uid } }`, { uid: uid });
                }
                
                await window.db.collection('custom_chores').doc(choreUid).update({
                    completed: false,
                    completedActivityUid: null,
                    completedActivityUids: [],
                    completedInfo: firebase.firestore.FieldValue.delete()
                });

                loadChoresFromFirestore();
                fetchWeeklyPoints();
            } catch (error) { alert("Error undoing task: " + error.message); }
        }

        // --- WEEKLY POINTS & ACTIVITY LOGIC ---
        async function fetchWeeklyPoints() {
            if (!API_TOKEN) return;
            const QUERY = `{ activities { uid date user { uid name } task { name value } } }`;

            try {
                const data = await fetchNipto(QUERY);
                if (!data.activities) throw new Error("No activities data found.");

                let points = {};
                ALL_USERS.forEach(u => points[u.uid] = 0);
                allWeekActivities = []; 

                data.activities.forEach(activity => {
                    let awardedPts = (activity.task && activity.task.value) ? activity.task.value : 0;
                    if (activity.user && points[activity.user.uid] !== undefined) {
                        points[activity.user.uid] += awardedPts;
                    }
                    allWeekActivities.push({ ...activity, parsedDate: new Date(activity.date), awardedPts: awardedPts });
                });

                let sortedUsers = ALL_USERS.map(u => ({ name: u.name, pts: points[u.uid], uid: u.uid })).sort((a, b) => b.pts - a.pts);

                let leaderboardHtml = sortedUsers.map((u, index) => {
                    let medal = index === 0 ? '🥇 1.' : index === 1 ? '🥈 2. ' : index === 2 ? '🥉 3.' : `${index + 1}.`;
                    
                    // Utilize Shared CSS Color Variables
                    let userColor = 'var(--text-main)';
                    if(u.uid === 'NMRQaRQbvCwBaJbiMFId') userColor = 'var(--user-ayden)';
                    else if(u.uid === 'RMNUTP8VOHD9PDzNjf0g') userColor = 'var(--user-dj)';
                    else if(u.uid === 'Llb9JjyTDvMnn8SJWfizXgthxl83') userColor = 'var(--user-alyssa)';
                    else if(u.uid === 'cHnAKABalRf0gETPsDt9EiJLyZd2') userColor = 'var(--user-devyn)';
                    else if(u.uid === '2pxnC1oGlZbLQLmu9UJJVPYOEmZ2') userColor = 'var(--user-carrina)';

                    return `<div><span style="color: var(--text-muted); margin-right: 3px;">${medal}</span> <span style="color: ${userColor}; font-weight: 800;">${u.name}: ${u.pts} pts</span></div>`;
                }).join('<div style="width: 1px; background: var(--border-color); margin: 0 10px;"></div>'); 

                const leaderboardContainer = document.getElementById('leaderboard-container');
                if(leaderboardContainer) leaderboardContainer.innerHTML = leaderboardHtml;

                renderHistory(allWeekActivities);

            } catch (error) {
                console.error("Error fetching points/history:", error);
                document.getElementById('historyContainer').innerHTML = "<div class='empty-history'>Error loading history.</div>";
            }
        }

        function renderHistory(activities) {
            const container = document.getElementById('historyContainer');
            container.innerHTML = '';
            if (activities.length === 0) { container.innerHTML = '<div class="empty-history">No tasks found.</div>'; return; }

            activities.sort((a, b) => b.parsedDate - a.parsedDate);
            const timeOptions = { weekday: 'short', hour: 'numeric', minute: '2-digit' };

            activities.forEach(act => {
                const knownUser = ALL_USERS.find(u => u.uid === (act.user && act.user.uid));
                const userName = knownUser ? knownUser.name : (act.user && act.user.name ? act.user.name : "Unknown User");
                const taskName = act.task ? act.task.name : "Deleted Task";
                const taskValue = act.awardedPts !== undefined ? act.awardedPts : (act.task ? act.task.value : 0);
                
                const userColorClass = act.user ? `history-user-${act.user.uid}` : 'history-user-other';

                const itemDiv = document.createElement('div');
                itemDiv.className = 'history-item';
                itemDiv.innerHTML = `
                    <div class="history-item-content">
                        <div class="history-task-name">${taskName}</div>
                        <div class="history-details">
                            <span class="${userColorClass}">${userName} (+${taskValue})</span>
                            <span>${act.parsedDate.toLocaleDateString(undefined, timeOptions)}</span>
                        </div>
                    </div>
                    <button class="delete-activity-btn" onclick="deleteTaskActivity('${act.uid}', this)" title="Delete Activity">🗑️</button>
                `;
                container.appendChild(itemDiv);
            });
        }

        async function deleteTaskActivity(activityUid, btnElement) {
            if (!API_TOKEN) { document.getElementById('pinModal').style.display = 'flex'; return; }
            if (!confirm("Are you sure you want to delete this logged task?")) return;

            const statusDiv = document.getElementById('status');
            const originalHtml = btnElement.innerHTML;
            btnElement.disabled = true;
            btnElement.innerHTML = "⏳";

            try {
                await fetchNipto(`mutation DeleteActivity($uid: String!) { deleteActivity(uid: $uid) { uid } }`, { uid: activityUid });
                statusDiv.innerText = `Activity deleted successfully!`;
                statusDiv.style.color = 'var(--success)';
                fetchWeeklyPoints();
                setTimeout(() => { statusDiv.innerText = ""; statusDiv.style.color = 'var(--text-main)'; }, 3000);
            } catch (error) {
                console.error("Delete Error:", error);
                statusDiv.innerText = `Error: ${error.message}`;
                statusDiv.style.color = 'var(--danger)';
                btnElement.disabled = false;
                btnElement.innerHTML = originalHtml;
            }
        }

        // --- TIME LOGIC ---
        function formatForInput(dateObj) {
            const y = dateObj.getFullYear();
            const m = String(dateObj.getMonth() + 1).padStart(2, '0');
            const d = String(dateObj.getDate()).padStart(2, '0');
            const h = String(dateObj.getHours()).padStart(2, '0');
            const min = String(dateObj.getMinutes()).padStart(2, '0');
            return `${y}-${m}-${d}T${h}:${min}`;
        }

        function setMode(mode) {
            if (isEditMode) return; 
            currentMode = mode;
            const statusLabel = document.getElementById('status');

            if (mode === 'live') {
                document.getElementById('btnLive').classList.add('active');
                document.getElementById('btnCustom').classList.remove('active');
                document.getElementById('customTimeBox').classList.remove('visible');
                statusLabel.innerText = "Ready (Using exact current time on click)";
            } else {
                document.getElementById('btnCustom').classList.add('active');
                document.getElementById('btnLive').classList.remove('active');
                document.getElementById('customTimeBox').classList.add('visible');
                
                const dateInput = document.getElementById('taskDate');
                if (!dateInput.value) dateInput.value = formatForInput(new Date());
                statusLabel.innerText = "Ready (Using custom time above)";
            }
        }

        function setTimeOffset(minutes) {
            if (currentMode === 'live') setMode('custom');
            const targetDate = new Date(); 
            targetDate.setMinutes(targetDate.getMinutes() + minutes);
            document.getElementById('taskDate').value = formatForInput(targetDate);
        }

        // --- API LOGGING LOGIC ---
        async function logTask(buttonElement, taskUid, taskName) {
            if (buttonElement.classList.contains('success')) return false;
            if (!API_TOKEN) { document.getElementById('pinModal').style.display = 'flex'; return false; }

            const statusDiv = document.getElementById('status');
            buttonElement.disabled = true;
            const targetUserId = getActiveUserId(); 

            let targetDate;
            if (currentMode === 'live') {
                targetDate = new Date(); 
            } else {
                const dateInput = document.getElementById('taskDate').value;
                if (!dateInput) {
                    statusDiv.innerText = "Error: Please select a valid custom date/time.";
                    statusDiv.style.color = 'var(--danger)';
                    buttonElement.disabled = false;
                    return false;
                }
                targetDate = new Date(dateInput);
            }

            statusDiv.innerText = `Logging: ${taskName}...`;
            statusDiv.style.color = 'var(--text-main)';

            try {
                await fetchNipto(
                    `mutation CreateActivity($done: String!, $doers: [String!], $date: Date) { createActivity(done: $done, doers: $doers, date: $date) { uid } }`, 
                    { done: taskUid, doers: [targetUserId], date: targetDate.toISOString() }
                );
                
                fetchWeeklyPoints();
                statusDiv.innerText = `Successfully logged: ${taskName}`;
                statusDiv.style.color = 'var(--success)';
                
                buttonElement.classList.add('success');
                if(!buttonElement.querySelector('.chore-title')) {
                    buttonElement.innerHTML += '<br><span style="font-size:12px;">✓ Logged</span>';
                }
                
                setTimeout(() => {
                    buttonElement.classList.remove('success');
                    buttonElement.disabled = false;
                    buttonElement.innerHTML = buttonElement.getAttribute('data-original-html') || buttonElement.innerHTML;
                    
                    if (isViewAllMode) statusDiv.innerText = "Viewing ALL Tasks";
                    else if (currentMode === 'live') statusDiv.innerText = "Ready (Using exact current time on click)";
                    else statusDiv.innerText = "Ready (Using custom time above)";
                    statusDiv.style.color = 'var(--text-main)';
                }, 3000);

                return true;

            } catch (error) {
                statusDiv.innerText = `Error: ${error.message}`;
                statusDiv.style.color = 'var(--danger)';
                buttonElement.disabled = false;
                return false;
            }
        }

        function handleTaskClick(btn, taskUid, taskName) {
            if (isEditMode) {
                if (tempEditPrefs.has(taskUid)) {
                    tempEditPrefs.delete(taskUid);
                    btn.classList.remove('selected-pref');
                    btn.classList.add('unselected-pref');
                } else {
                    tempEditPrefs.add(taskUid);
                    btn.classList.add('selected-pref');
                    btn.classList.remove('unselected-pref');
                }
            } else {
                logTask(btn, taskUid, taskName);
            }
        }

        // --- RENDER TASKS GRID LOGIC ---
        function renderTasks() {
            const container = document.getElementById('mainContainer');
            container.innerHTML = ''; 
            
            const userId = getActiveUserId();
            const userPrefs = getUserPreferences();
            const visibleTasks = TASKS.filter(t => isEditMode || isViewAllMode || userPrefs.has(t.uid));

            if (visibleTasks.length === 0 && !isEditMode) {
                container.innerHTML = '<div class="empty-dashboard-msg" style="text-align: center; margin-top: 40px;">Your dashboard is empty. Click "Edit Dashboard" to add tasks!</div>';
                return;
            }

            const groupedTasks = visibleTasks.reduce((acc, task) => {
                if (!acc[task.category]) acc[task.category] = [];
                acc[task.category].push(task);
                return acc;
            }, {});

            Object.keys(groupedTasks).sort().forEach(category => {
                const section = document.createElement('div');
                section.className = 'category-section';

                const isCatCollapsed = localStorage.getItem(`nipto_cat_${category}`) === 'true';

                const header = document.createElement('h3');
                header.className = 'category-header collapsible-header';
                header.innerHTML = `${category} <span class="toggle-icon ${isCatCollapsed ? 'collapsed' : ''}">▼</span>`;
                
                header.onclick = () => {
                    const collapsed = gridWrapper.classList.toggle('collapsed');
                    header.querySelector('.toggle-icon').classList.toggle('collapsed', collapsed);
                    localStorage.setItem(`nipto_cat_${category}`, collapsed);
                };
                section.appendChild(header);

                const gridWrapper = document.createElement('div');
                gridWrapper.className = `collapsible-content ${isCatCollapsed ? 'collapsed' : ''}`;
                
                const grid = document.createElement('div');
                grid.className = 'task-grid';

                groupedTasks[category].forEach(task => {
                    const btn = document.createElement('button');
                    btn.className = 'task-btn';
                    
                    if (isEditMode) {
                        btn.classList.add('edit-mode');
                        if (tempEditPrefs.has(task.uid)) {
                            btn.classList.add('selected-pref');
                            btn.innerHTML = `<span>${task.name}</span><span style="font-size:12px; margin-top:5px; display:block;">✅ Selected</span>`;
                        } else {
                            btn.classList.add('unselected-pref');
                            btn.innerHTML = `<span>${task.name}</span><span style="font-size:12px; margin-top:5px; display:block;">❌ Hidden</span>`;
                        }
                    } else {
                        btn.innerHTML = `<span>${task.name}</span>`;
                        
                        const isPinned = task.pinnedUsers && task.pinnedUsers.includes(userId);
                        const pinBtn = document.createElement('button');
                        pinBtn.className = `pin-task-btn ${isPinned ? 'active' : ''}`;
                        pinBtn.innerHTML = '📌';
                        pinBtn.title = isPinned ? "Unpin task" : "Pin task to reminders";
                        pinBtn.onclick = (e) => {
                            e.stopPropagation(); 
                            togglePinTask(task.uid);
                        };
                        btn.appendChild(pinBtn);
                    }
                    
                    btn.setAttribute('data-original-html', btn.innerHTML);
                    btn.onclick = () => handleTaskClick(btn, task.uid, task.name);
                    grid.appendChild(btn);
                });

                gridWrapper.appendChild(grid);
                section.appendChild(gridWrapper);
                container.appendChild(section);
            });
        }

       // Initialize
        initUsers();
        
        const collapsibles = [
            { content: 'activity-content', icon: 'activity-icon', key: 'nipto_activity_collapsed' },
            { content: 'pinned-content', icon: 'pin-icon', key: 'nipto_pin_collapsed' },
            { content: 'assigned-content', icon: 'assign-icon', key: 'nipto_assign_collapsed' }
        ];
        initCollapsibles(collapsibles);

        checkAuth(async () => {
            await loadTasksFromFirestore();
            await loadChoresFromFirestore();
            fetchWeeklyPoints();
        });

    </script>
</body>
