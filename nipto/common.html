<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Nipto Dashboard</title>
    <link rel="stylesheet" href="nipto-shared.css">

</head>
<body>

    <div id="pinModal" style="display: none;">
        <div class="modal-content">
            <h2>Enter Dashboard PIN</h2>
            <p style="font-size: 14px; color: #aaa;">Please enter your 4-digit PIN to decrypt the API key.</p>
            <input type="password" id="pinInput" maxlength="4" placeholder="••••">
            <br>
            <button onclick="savePin()">Unlock</button>
            <div id="pinError" style="color: var(--danger); margin-top: 15px; display: none; font-size: 14px;">Invalid PIN format</div>
        </div>
    </div>

    <div class="header">
        <div class="dashboard-header-controls">
            <div>
                <h2 style="margin-bottom: 15px;">Household Tasks</h2>
                <div class="user-select-container" style="margin-bottom: 0;">
                    <label for="userSelect" style="font-weight: 600; margin-right: 10px;">Dashboard For:</label>
                    <select id="userSelect" onchange="onUserChange()"></select>
                </div>
            </div>
            <div>
                <button id="editBtn" class="action-btn" onclick="toggleEditMode()">✏️ Edit Dashboard</button>
            </div>
        </div>

        <div class="controls-wrapper">
            <div class="mode-toggle">
                <button class="mode-btn active" id="btnLive" onclick="setMode('live')">Live Time</button>
                <button class="mode-btn" id="btnCustom" onclick="setMode('custom')">Custom Time</button>
            </div>

            <div class="custom-time-container" id="customTimeBox">
                <div class="quick-times">
                    <button class="qt-btn" onclick="setTimeOffset(-15)">-15m</button>
                    <button class="qt-btn" onclick="setTimeOffset(-60)">-1h</button>
                    <button class="qt-btn" onclick="setTimeOffset(-1440)">Yesterday</button>
                </div>
                <div class="date-input-group">
                    <input type="datetime-local" id="taskDate">
                </div>
            </div>

            <div id="status">Ready (Using current exact time on click)</div>
        </div>
    </div>

    <div id="mainContainer"></div>

    <script>
        // --- CONFIGURATION ---
        const USERS = [
            { uid: "2pxnC1oGlZbLQLmu9UJJVPYOEmZ2", name: "Carrina" },
            { uid: "Llb9JjyTDvMnn8SJWfizXgthxl83", name: "Alyssa M" },
            { uid: "cHnAKABalRf0gETPsDt9EiJLyZd2", name: "Devyn" }
        ];

        const URL = "https://nipto.app/graphql";
        const COOKIE_NAME = "nipto_api_key";
        let API_TOKEN = "";

        // Master list of available tasks
        const TASKS = [
            { name: "Milk goat", icon: "🐐", category: "Goats", uid: "ZkiQmzZei25ddvxUK7Iu" },
            { name: "Feed baby goat", icon: "🐐", category: "Goats", uid: "VljwYXq5EXtWWxMe1q86" },
            { name: "Let Donnie out", icon: "🐶", category: "Dogs", uid: "6O3fiiNqsLJWVOTXw1kX" },
            { name: "Let Sofia out", icon: "🐶", category: "Dogs", uid: "bHxZqo9HmKNKdL3BDfzO" },
            { name: "Let Sofia in", icon: "🐶", category: "Dogs", uid: "fPmUR71YmobZXNBzFaRq" },
            { name: "Water Donnie", icon: "🐶", category: "Dogs", uid: "SuUkZuMxSNdJ7mokzqVJ" },
            { name: "Water Sofia", icon: "🐶", category: "Dogs", uid: "umQGwgeQjD2eNSb27MSD" },
            { name: "Feed Donnie", icon: "🐶", category: "Dogs", uid: "dLvjQVK7jiNJAqiFjDE4" },
            { name: "Feed Sofia", icon: "🐶", category: "Dogs", uid: "66j4ReblR6dPWbNe8iPQ" },
            { name: "Refill cat food", icon: "😺", category: "Cats", uid: "Hz8FeEyLrx2S43erFZGn" },
            { name: "Refill cat water", icon: "😺", category: "Cats", uid: "jS9UZDtAqA0j4LKNQboD" },
            { name: "Feed Kevin", icon: "🐖", category: "Pigs", uid: "uASAuUB1hAyIkLPbe7Cn" },
            { name: "Empty Dishwasher", icon: "🍽️", category: "Kitchen", uid: "IX6xdoeq1ycAYTY0woDD" },
            { name: "Load Dishwasher and run it", icon: "🍽️", category: "Kitchen", uid: "dCfP1Lmm4G0xneSq8KmO" },
            { name: "Make Dinner", icon: "🍽️", category: "Kitchen", uid: "skEcHTDOUnoxuQOVYjRe" },
            { name: "Make lunch/small meal", icon: "🍽️", category: "Kitchen", uid: "LeMiW69FEFOKmfwApHjv" },
            { name: "Wash a load of laundry", icon: "👕", category: "Laundry", uid: "3f0dzsFnwYJnAXXxJYe9" },
            { name: "Dry a load of laundry", icon: "👕", category: "Laundry", uid: "XmTvn2tHBbgsXrUKr87u" },
            { name: "Gather laundry", icon: "👕", category: "Laundry", uid: "MxASRpVuaTHNbZM80dK2" },
            { name: "Hang clothes on line", icon: "👕", category: "Laundry", uid: "B1gNNNq2CuALNGUrXaCn" },
            { name: "Get clothes off line", icon: "👕", category: "Laundry", uid: "ZAbqOInmAdRcYex9zkR3" },
            { name: "Organize/put away items", icon: "🛠️", category: "Household", uid: "FxNNOQMk3hEvZDX4uEzj" },
            { name: "Take trash out of a can", icon: "🗑️", category: "Household", uid: "YCJV3ex1bKPzWdCpHym6" }
        ];

        let currentMode = 'live'; 
        let isEditMode = false;
        let tempEditPrefs = new Set(); // Holds selections during edit mode

        // --- AUTH & COOKIE LOGIC ---
        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
            return null;
        }

        function setCookie(name, value, days) {
            let expires = "";
            if (days) {
                const date = new Date();
                date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
                expires = "; expires=" + date.toUTCString();
            }
            document.cookie = name + "=" + (value || "") + expires + "; path=/";
        }

        function decodeKey(pin) {
            const masked = "$a#0$*fa-*a07-%%f%-a%*%-f*c8$9c*%8*8";
            const p1 = pin[0], p2 = pin[1], p3 = pin[2], p4 = pin[3];
            return masked.replace(/\*/g, p1).replace(/#/g, p2).replace(/\$/g, p3).replace(/%/g, p4);
        }

        function savePin() {
            const pin = document.getElementById('pinInput').value;
            if (pin.length !== 4) {
                document.getElementById('pinError').style.display = 'block';
                return;
            }
            API_TOKEN = decodeKey(pin);
            setCookie(COOKIE_NAME, API_TOKEN, 30); 
            document.getElementById('pinModal').style.display = 'none';
        }

        function checkAuth() {
            const savedToken = getCookie(COOKIE_NAME);
            if (savedToken) {
                API_TOKEN = savedToken;
            } else {
                document.getElementById('pinModal').style.display = 'flex';
            }
        }

        // --- USER & DASHBOARD PREFERENCES ---
        function initUsers() {
            const select = document.getElementById('userSelect');
            USERS.forEach(user => {
                const option = document.createElement('option');
                option.value = user.uid;
                option.text = user.name;
                // Default to Alyssa
                if (user.uid === "Llb9JjyTDvMnn8SJWfizXgthxl83") option.selected = true;
                select.appendChild(option);
            });
        }

        function onUserChange() {
            if (isEditMode) toggleEditMode(); // exit edit mode if they switch users
            renderTasks();
        }

        function getActiveUserId() {
            return document.getElementById('userSelect').value;
        }

        function getUserPreferences() {
            const userId = getActiveUserId();
            const saved = localStorage.getItem(`nipto_dash_${userId}`);
            if (saved) {
                return new Set(JSON.parse(saved));
            }
            // If first time, return ALL tasks so they have something to start with
            return new Set(TASKS.map(t => t.uid));
        }

        function toggleEditMode() {
            isEditMode = !isEditMode;
            const btn = document.getElementById('editBtn');
            const statusDiv = document.getElementById('status');

            if (isEditMode) {
                btn.innerText = "💾 Save Dashboard";
                btn.classList.add('save-mode');
                statusDiv.innerText = "EDIT MODE: Click tasks to add/remove them from this user's dashboard.";
                statusDiv.style.color = "var(--primary)";
                tempEditPrefs = getUserPreferences();
            } else {
                btn.innerText = "✏️ Edit Dashboard";
                btn.classList.remove('save-mode');
                // Save to local storage
                localStorage.setItem(`nipto_dash_${getActiveUserId()}`, JSON.stringify(Array.from(tempEditPrefs)));
                
                if (currentMode === 'live') statusDiv.innerText = "Ready (Using exact current time on click)";
                else statusDiv.innerText = "Ready (Using custom time above)";
                statusDiv.style.color = "var(--text-main)";
            }
            renderTasks();
        }

        function handleTaskClick(btn, taskUid, taskName) {
            if (isEditMode) {
                // Toggle selection state
                if (tempEditPrefs.has(taskUid)) {
                    tempEditPrefs.delete(taskUid);
                    btn.classList.remove('selected-pref');
                    btn.classList.add('unselected-pref');
                } else {
                    tempEditPrefs.add(taskUid);
                    btn.classList.add('selected-pref');
                    btn.classList.remove('unselected-pref');
                }
            } else {
                // Normal Logging behavior
                logTask(btn, taskUid, taskName);
            }
        }

        // --- TIME LOGIC ---
        function formatForInput(dateObj) {
            const y = dateObj.getFullYear();
            const m = String(dateObj.getMonth() + 1).padStart(2, '0');
            const d = String(dateObj.getDate()).padStart(2, '0');
            const h = String(dateObj.getHours()).padStart(2, '0');
            const min = String(dateObj.getMinutes()).padStart(2, '0');
            return `${y}-${m}-${d}T${h}:${min}`;
        }

        function setMode(mode) {
            if (isEditMode) return; // Prevent changing time modes while editing
            currentMode = mode;
            const btnLive = document.getElementById('btnLive');
            const btnCustom = document.getElementById('btnCustom');
            const customBox = document.getElementById('customTimeBox');
            const statusLabel = document.getElementById('status');

            if (mode === 'live') {
                btnLive.classList.add('active');
                btnCustom.classList.remove('active');
                customBox.classList.remove('visible');
                statusLabel.innerText = "Ready (Using exact current time on click)";
            } else {
                btnCustom.classList.add('active');
                btnLive.classList.remove('active');
                customBox.classList.add('visible');
                
                const dateInput = document.getElementById('taskDate');
                if (!dateInput.value) {
                    dateInput.value = formatForInput(new Date());
                }
                statusLabel.innerText = "Ready (Using custom time above)";
            }
        }

        function setTimeOffset(minutes) {
            if (currentMode === 'live') setMode('custom');
            const dateInput = document.getElementById('taskDate');
            const targetDate = new Date(); 
            targetDate.setMinutes(targetDate.getMinutes() + minutes);
            dateInput.value = formatForInput(targetDate);
        }

        // --- API LOGIC ---
        async function logTask(buttonElement, taskUid, taskName) {
            if (buttonElement.classList.contains('success')) return;
            if (!API_TOKEN) {
                document.getElementById('pinModal').style.display = 'flex';
                return;
            }

            const statusDiv = document.getElementById('status');
            buttonElement.disabled = true;
            const targetUserId = getActiveUserId(); // Use the selected user!

            let targetDate;
            if (currentMode === 'live') {
                targetDate = new Date(); 
            } else {
                const dateInput = document.getElementById('taskDate').value;
                if (!dateInput) {
                    statusDiv.innerText = "Error: Please select a valid custom date/time.";
                    statusDiv.style.color = 'var(--error)';
                    buttonElement.disabled = false;
                    return;
                }
                targetDate = new Date(dateInput);
            }

            statusDiv.innerText = `Logging: ${taskName}...`;
            statusDiv.style.color = 'var(--text-main)';
            const exactFormatString = targetDate.toISOString();

            const MUTATION = `
                mutation CreateActivity($done: String!, $doers: [String!], $date: Date) {
                  createActivity(done: $done, doers: $doers, date: $date) {
                    uid
                  }
                }`;

            try {
                const response = await fetch(URL, {
                    method: 'POST',
                    headers: {
                        'Authorization': API_TOKEN,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        query: MUTATION,
                        variables: {
                            done: taskUid,
                            doers: [targetUserId], // Send the active user's UID here
                            date: exactFormatString
                        }
                    })
                });

                const data = await response.json();
                if (data.errors) throw new Error(data.errors[0].message || "GraphQL Error");

                statusDiv.innerText = `Successfully logged: ${taskName}`;
                statusDiv.style.color = 'var(--success)';
                
                buttonElement.classList.add('success');
                buttonElement.innerHTML += '<br><span style="font-size:12px;">✓ Logged</span>';
                
                setTimeout(() => {
                    buttonElement.classList.remove('success');
                    buttonElement.disabled = false;
                    buttonElement.innerHTML = buttonElement.getAttribute('data-original-html');
                    
                    if (currentMode === 'live') statusDiv.innerText = "Ready (Using exact current time on click)";
                    else statusDiv.innerText = "Ready (Using custom time above)";
                    statusDiv.style.color = 'var(--text-main)';
                }, 3000);

            } catch (error) {
                statusDiv.innerText = `Error: ${error.message}`;
                statusDiv.style.color = 'var(--error)';
                buttonElement.disabled = false;
                
                if (error.message.toLowerCase().includes("unauthorized") || error.message.toLowerCase().includes("token")) {
                    setCookie(COOKIE_NAME, "", -1);
                    API_TOKEN = "";
                    document.getElementById('pinModal').style.display = 'flex';
                }
            }
        }

        // --- RENDER LOGIC ---
        function renderTasks() {
            const container = document.getElementById('mainContainer');
            container.innerHTML = ''; // clear current board
            
            const userPrefs = getUserPreferences();
            
            // Filter tasks: If edit mode, show all. If view mode, show only preferred.
            const visibleTasks = TASKS.filter(t => isEditMode || userPrefs.has(t.uid));

            if (visibleTasks.length === 0 && !isEditMode) {
                container.innerHTML = '<div class="empty-dashboard-msg">Your dashboard is empty. Click "Edit Dashboard" to add tasks!</div>';
                return;
            }

            const groupedTasks = visibleTasks.reduce((acc, task) => {
                if (!acc[task.category]) acc[task.category] = [];
                acc[task.category].push(task);
                return acc;
            }, {});

            const categoryOrder = ["Goats", "Dogs", "Cats", "Pigs", "Kitchen", "Laundry", "Household"];

            categoryOrder.forEach(category => {
                if (!groupedTasks[category]) return;

                const section = document.createElement('div');
                section.className = 'category-section';

                const header = document.createElement('h3');
                header.className = 'category-header';
                header.innerText = category;
                section.appendChild(header);

                const grid = document.createElement('div');
                grid.className = 'task-grid';

                groupedTasks[category].forEach(task => {
                    const btn = document.createElement('button');
                    btn.className = 'task-btn';
                    
                    if (isEditMode) {
                        btn.classList.add('edit-mode');
                        if (tempEditPrefs.has(task.uid)) {
                            btn.classList.add('selected-pref');
                            btn.innerHTML = `<span class="task-icon">${task.icon}</span><span>${task.name}</span><span style="font-size:12px; margin-top:5px;">✅ Selected</span>`;
                        } else {
                            btn.classList.add('unselected-pref');
                            btn.innerHTML = `<span class="task-icon">${task.icon}</span><span>${task.name}</span><span style="font-size:12px; margin-top:5px;">❌ Hidden</span>`;
                        }
                    } else {
                        btn.innerHTML = `<span class="task-icon">${task.icon}</span><span>${task.name}</span>`;
                    }
                    
                    btn.setAttribute('data-original-html', btn.innerHTML);
                    btn.onclick = () => handleTaskClick(btn, task.uid, task.name);
                    grid.appendChild(btn);
                });

                section.appendChild(grid);
                container.appendChild(section);
            });
        }

        // Initialize
        initUsers();
        checkAuth();
        renderTasks();

    </script>
</body>
</html>
